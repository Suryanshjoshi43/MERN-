<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="Feedback form 2.html">
        <label for="Name" >Name:</label>
        <input type="text" id="Name" name="Name" placeholder="Write your Name">
        <br><br>

        <label for="Email" >Email:</label>
        <input type="email" id="Email" name="Email" placeholder="Write your Email">
        <br><br>

        <label for="message" >Message:</label>
        <br>
        <textarea id="message" name="message" cols="5" rows="3"></textarea>
        <br><br>
        <label >Rate us out of 5:</label>
        <br>
        <label for="1">1</label>
        <input type="radio" id="1" name="rating" value="1">
        <br>
        <label for="2">2</label>
        <input type="radio" id="2" name="rating" value="2">
        <br>
        <label for="3">3</label>
        <input type="radio" id="3" name="rating" value="3">
        <br>
        <label for="4">4</label>
        <input type="radio" id="4" name="rating" value="4">
        <br>
        <label for="5">5</label>
        <input type="radio" id="5" name="rating" value="5">
        <br><br>
        <button type="submit">Send your Message!</button>

        


    </form>
</body>
</html>
